<!DOCTYPE html>
<html lang="PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <title>Fila de assinaturas</title>
</head>
<body>
    <div class="painel">
        <header class="painel-titulo">
            <h1 class="titulo">DOCUMENTOS PENDENTES</h1>
        </header>

        <div class="painel-acoes">
            <button class="btn btn-primary" onclick="adicionarDocumento()">Adicionar Documento</button>
        </div>

        <table class="table table-light table-bordered table-hover mb-0 tabela-grade">
            <thead>
                <tr>
                    <th scope="col">ID</th>
                    <th scope="col">NOME DOC.</th>
                    <th scope="col">STATUS</th>
                    <th scope="col">ASSINAR</th>
                    <th scope="col">REMOVER</th>
                </tr>
            </thead>

            <tbody id="tabela">
            </tbody>
        </table>
    </div>
</body>
<script src="../model/model.js"></script>
<script src="../controller/controller.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
